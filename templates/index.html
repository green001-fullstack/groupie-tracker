<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists</title>
    <link rel="stylesheet" href="/static/index.css">
</head>

<body>
    <!-- navbar -->
    <div class="nav-container">
        <div class="nav-bar">
            <h2 class="logo">TrackWave</h2>
            <div class="nav-links">
                <a href="#">Discover</a>
                <a href="#">Artists</a>
                <a href="#">Tour</a>
            </div>
            <div class="nav-status">
                <span class="live-dot"></span>
                <p>Updated Daily • 52 Artists</p>
            </div>
        </div>
    </div>

    <!-- hero section  -->
     <div class="hero-section">
        <div class="hero-text">
            <h1>Track Legendary Artists Across <span class="green-subtext">The Globe</span></h1>
            <p>Explore concert locations, members, albums and live tour history</p>
        </div>
        <div class="hero-images">
             <div class="image-placeholder"></div>
        </div>
     </div>

    <div class="container">

        <!-- Header -->
        <header class="header">
            <!-- <h1>Let's Get The Tracking Started</h1>
            <h2>Discover and explore your favorite artists</h2> -->

            <!-- Controls -->
            <div class="form">

                <form class="search-form" action="/search" method="GET">
                    <input class="input" type="text" name="query" placeholder="Search for an artist...">
                    <button class="button" type="submit">Search</button>
                </form>

                <form class="filter" action="/artists" method="GET">
                    <select class="select" name="sort" onchange="this.form.submit()">
                        <option value="">Filter artist by...</option>
                        <option value="default">Default</option>
                        <option value="ascending">Ascending</option>
                        <option value="descending">Descending</option>
                        <option value="oldest">Oldest</option>
                        <option value="newest">Newest</option>
                    </select>
                </form>

            </div>
        </header>

        <!-- Artists -->
        <section class="artists-collection">
            <h2>List of Artists</h2>

            <div class="artist-grid">
                {{range .}}
                <div class="artist-card">
                    <img src="{{.Image}}" alt="{{.Name}}">
                    <h3>{{.Name}}</h3>
                    <p><strong>First Album:</strong> {{.FirstAlbum}}</p>
                    <a href="/artists/{{.Id}}">Personal Details</a>
                </div>
                {{end}}
            </div>
        </section>

    </div>

</body>

</html>
