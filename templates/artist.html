<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/artists.css">
</head>

<body>
    <div class="container">
        <h1>Personal Details</h1>
        <div class="artist-container">
            <div class="top-details">
                <img src="{{.Image}}" alt="{{.Name}}">
                <h2>{{.Name}}</h2>
                <p><strong>First Album:</strong> {{.FirstAlbum}}</p>
            </div>
            <div class="members">
                <h2>Members</h2>

                <div class="member-list">
                    {{range .Members}}
                    <p>{{.}}</p>
                    {{end}}
                </div>
            </div>
            <div class="date-locations">
                <h3>Concert Dates</h3>
                <div class="locations-grid">
                    {{range $key, $value := .DatesLocations}}
                    <div class="location-card">
                        <h4>{{$key | formatLocation}}</h4>
                        <ul class="date-list">
                            {{range $value}}
                            <li>{{.}}</li>
                            {{end}}
                        </ul>
                    </div>
                    {{end}}
                </div>
            </div>
        </div>
    </div>
</body>

</html>
