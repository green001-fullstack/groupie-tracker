<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Details</title>

    <link rel="stylesheet" href="/static/artists.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

    <!-- MAP -->
    <div id="map" style="height: 500px;"></div>

    <!-- CONTENT -->
    <div class="container">

        <h1>Personal Details</h1>

        <div class="artist-container">

            <!-- TOP DETAILS -->
            <div class="top-details">
                <img src="{{.Image}}" alt="{{.Name}}">
                <h2>{{.Name}}</h2>
                <p><strong>First Album:</strong> {{.FirstAlbum}}</p>
            </div>

            <!-- MEMBERS -->
            <div class="members">
                <h2>Members</h2>

                <div class="member-list">
                    {{range .Members}}
                    <p>{{.}}</p>
                    {{end}}
                </div>
            </div>

            <div class="creation-date">
                <h2>Creation Date</h2>
                <p>{{.CreationDate}}</p>
            </div>

            <!-- CONCERT LOCATIONS -->
            <div class="date-locations">

                <h3>Concert Dates</h3>

                <div class="locations-grid">

                    {{range $key, $value := .DatesLocations}}

                    <div class="location-card">

                        <h4>{{$key | formatLocation}}</h4>

                        <ul class="date-list">
                            {{range $value}}
                            <li>{{.}}</li>
                            {{end}}
                        </ul>

                    </div>

                    {{end}}

                </div>

            </div>

        </div>

    </div>

    <!-- MAP SCRIPT -->
<script>
var map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap'
}).addTo(map);

// SAFE DATA FROM GO
var locations = [
    {{- range .Locations }}
    {
        name: "{{.Name}}",
        lat: parseFloat("{{.Lat}}"),
        lon: parseFloat("{{.Lon}}"),
        date: "{{index .Dates 0}}"
    },
    {{- end }}
];

console.log("locations:", locations);

// ADD MARKERS (STRICT CHECK)
locations.forEach(loc => {
    if (
        Number.isFinite(loc.lat) &&
        Number.isFinite(loc.lon)
    ) {
        L.marker([loc.lat, loc.lon])
            .addTo(map)
            .bindPopup(
                `<strong>${loc.name}</strong><br>Date: ${loc.date}`
            );
    } else {
        console.warn("Skipping invalid location:", loc);
    }
});
</script>
</body>

</html>
